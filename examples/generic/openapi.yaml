openapi: 3.0.3
info:
  title: Orders API (Generic)
  version: 1.0.0
paths:
  /orders/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders:
    get:
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: number
        - name: verbose
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        quantity:
          type: number
        status:
          type: string
          enum:
            - pending
            - shipped
            - delivered
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - quantity
        - status
        - createdAt
    CreateOrderInput:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: number
        note:
          type: string
      required:
        - productId
        - quantity
