openapi: 3.0.3
info:
  title: Orders API (tRPC)
  version: 1.0.0
paths:
  /trpc/orders.getById:
    get:
      parameters:
        - name: input
          in: query
          required: false
          schema:
            type: object
            properties:
              id:
                type: string
            required:
              - id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /trpc/orders.create:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                quantity:
                  type: number
              required:
                - productId
                - quantity
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
        productId:
          type: string
        quantity:
          type: number
        status:
          type: string
          enum:
            - pending
            - shipped
            - delivered
      required:
        - id
        - productId
        - quantity
        - status
